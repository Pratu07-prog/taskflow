version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: taskflow_postgres
    environment:
      POSTGRES_DB: taskflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_password_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d taskflow_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - taskflow_network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: taskflow_db
      DB_USER: postgres
      DB_PASSWORD: postgres_password_dev
      DB_POOL_MIN: 2
      DB_POOL_MAX: 20
      JWT_SECRET: super_secret_jwt_key_for_development_change_in_production
      JWT_EXPIRY: 24h
      BCRYPT_COST: 12
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX_REQUESTS: 10
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/backend/src
      - ./migrations:/app/migrations
      - ./seeds:/app/seeds
    command: npm run dev
    networks:
      - taskflow_network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  taskflow_network:
    driver: bridge
